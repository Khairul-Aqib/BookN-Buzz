{% extends "base.html" %}
{% block title %}Sign up{% endblock %}

{% block content %}
<div class="panel narrow auth-card">
  <h1>Create your account</h1>
  <p class="lead">Join BookN'Buzz and book your first fresh cut.</p>

  <form method="post" action="{{ url_for('auth.register') }}">
    <div class="form-row">
      <label for="name">Full name</label>
      <input type="text" id="name" name="name" value="{{ form.name or '' }}" required autofocus>
    </div>
    <div class="form-row">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" value="{{ form.email or '' }}" required>
    </div>
    <div class="form-row">
      <label for="phone">Phone <span class="muted">(optional)</span></label>
      <input type="text" id="phone" name="phone" value="{{ form.phone or '' }}">
    </div>
    <div class="form-row">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>
      <span class="form-hint">At least 6 characters.</span>
    </div>
    <div class="form-row">
      <label for="confirm">Confirm password</label>
      <input type="password" id="confirm" name="confirm" required>
    </div>
    <button class="btn btn-solid btn-block" type="submit">Create account</button>
  </form>

  <p class="form-aside">
    Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a>
  </p>
</div>
{% endblock %}
